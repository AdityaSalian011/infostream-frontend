<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-pink-100 min-h-screen p-4 py-8">
    
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl p-8">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Setup Your Settings</h1>
            <p class="text-gray-600">Tell us your location and API preferences</p>
        </div>

        <!-- Settings Form -->
        <form id="settingsForm" class="space-y-6">
            
            <!-- Location Section -->
            <div class="bg-gray-50 p-6 rounded-xl">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    Location *
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="country" class="block text-sm font-medium text-gray-700 mb-2">Country *</label>
                        <input 
                            type="text" 
                            id="country" 
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                            placeholder="e.g., United States"
                        >
                    </div>
                    
                    <div>
                        <label for="city" class="block text-sm font-medium text-gray-700 mb-2">City *</label>
                        <input 
                            type="text" 
                            id="city" 
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                            placeholder="e.g., New York"
                        >
                    </div>
                </div>
            </div>

            <!-- API Keys Section -->
            <div class="bg-gray-50 p-6 rounded-xl">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                    API Keys (Optional)
                </h2>
                
                <p class="text-sm text-gray-600 mb-4">Provide your own API keys for personalized news and weather data</p>
                
                <div class="space-y-4">
                    <div>
                        <label for="newsApiKey" class="block text-sm font-medium text-gray-700 mb-2">
                            News API Key
                            <span class="text-xs text-gray-500 font-normal">(Get yours at <a href="https://newsapi.org" target="_blank" class="text-indigo-600 hover:underline">newsapi.org</a>)</span>
                        </label>
                        <input 
                            type="text" 
                            id="newsApiKey" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition font-mono text-sm"
                            placeholder="Enter your News API key (optional)"
                        >
                    </div>
                    
                    <div>
                        <label for="weatherApiKey" class="block text-sm font-medium text-gray-700 mb-2">
                            Weather API Key
                            <span class="text-xs text-gray-500 font-normal">(Get yours at <a href="https://openweathermap.org/api" target="_blank" class="text-indigo-600 hover:underline">openweathermap.org</a>)</span>
                        </label>
                        <input 
                            type="text" 
                            id="weatherApiKey" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition font-mono text-sm"
                            placeholder="Enter your Weather API key (optional)"
                        >
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                class="w-full bg-indigo-600 text-white py-4 rounded-lg font-semibold text-lg hover:bg-indigo-700 transition-all shadow-lg hover:shadow-xl"
            >
                Continue to News Preferences →
            </button>

        </form>

        <!-- Navigation -->
        <div class="text-center mt-6">
            <a href="login.html" class="text-indigo-600 hover:text-indigo-800 font-medium text-sm">
                ← Back to Login
            </a>
        </div>

    </div>
    <script src="config.js"></script>
    <script>
        // Save settings to backend
        async function saveSettings(settingsData, currentUser) {
            try {
                const response = await fetch(
                    `${API_BASE_URL}/settings/${currentUser.id}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(settingsData)
                    }
                );

                const result = await response.json();

                if (response.ok) {
                    console.log('✓ Settings saved:', result);

                    // Update localStorage with settings info
                    try {
                        const updatedUser = {
                            ...currentUser,
                            settings: {
                                country: result.country,
                                city: result.city
                            }
                        };
                        localStorage.setItem('currentUser', JSON.stringify(updatedUser));
                    } catch (error) {
                        console.error('Error updating localStorage:', error);
                    }

                    alert('Settings saved successfully!');
                    window.location.href = 'topic-and-schedule.html';
                } else {
                    console.error('✗ Failed to save settings:', result.detail);
                    alert(result.detail || 'Failed to save settings. Please try again.');
                }
            } catch (error) {
                console.error('✗ Error saving settings:', error);
                alert('Could not connect to server. Make sure the backend is running.\nRun: python main.py');
            }
        }

        // Handle form submission
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get user from localStorage
            let currentUser;
            try {
                currentUser = JSON.parse(localStorage.getItem('currentUser'));
            } catch (error) {
                console.error('Error accessing localStorage:', error);
                alert('Error accessing user session. Please login again!');
                window.location.href = 'login.html';
                return;
            }

            if (!currentUser || !currentUser.id) {
                alert('Session expired. Please login again!');
                window.location.href = 'login.html';
                return;
            }

            // Collect form data
            const country = document.getElementById('country').value.trim();
            const city = document.getElementById('city').value.trim();
            const newsApiKey = document.getElementById('newsApiKey').value.trim();
            const weatherApiKey = document.getElementById('weatherApiKey').value.trim();

            const settingsData = {
                country: country,
                city: city,
                newsApi: newsApiKey || null,
                weatherApi: weatherApiKey || null
            };

            console.log('Submitting settings:', settingsData);

            await saveSettings(settingsData, currentUser);
        });
    </script>

</body>
</html>
