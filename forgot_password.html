<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-3 sm:p-4">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-5 sm:p-8">

        <!-- Header -->
        <div class="text-center mb-5 sm:mb-8">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-1 sm:mb-2">Forgot Password</h1>
            <p class="text-sm sm:text-base text-gray-600">Enter your email and we'll send you a reset link</p>
        </div>

        <!-- Alert Box (hidden by default) -->
        <div id="alert-box" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

        <!-- Form -->
        <div class="space-y-4">
            <div>
                <label for="email" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input
                    type="email"
                    id="email"
                    placeholder="you@gmail.com"
                    autocomplete="email"
                    class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                />
            </div>

            <button
                id="submit-btn"
                onclick="handleSubmit()"
                class="w-full bg-indigo-600 text-white py-2.5 sm:py-3 text-sm sm:text-base rounded-lg font-semibold hover:bg-indigo-700 transition-all shadow-md hover:shadow-lg"
            >
                Send Reset Link
            </button>
        </div>

        <!-- Back to login -->
        <div class="text-center mt-5 sm:mt-6">
            <a href="index.html" class="text-indigo-600 hover:text-indigo-800 font-medium text-xs sm:text-sm">
                ← Back to Login
            </a>
        </div>

    </div>

    <script src="config.js"></script>
    <script>
        function showAlert(message, type) {
            const box = document.getElementById('alert-box');
            box.textContent = message;
            box.className = type === 'success'
                ? 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-green-50 text-green-700 border border-green-200'
                : 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200';
        }

        async function handleSubmit() {
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('submit-btn');

            if (!email) {
                showAlert('Please enter your email address.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const response = await fetch(`${API_BASE_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 'email': email })
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert(result.message || 'Reset link sent! Check your inbox.', 'success');
                    document.getElementById('email').value = '';
                } else {
                    const msg = result.detail?.[0]?.msg?.replace('Value error, ', '') || result.detail || 'Something went wrong.'
                    showAlert(msg, 'error');
                }

            } catch (err) {
                showAlert('Could not connect to server. Please try again later.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        }

        document.getElementById('email').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleSubmit();
        });
    </script>

</body>
</html>
