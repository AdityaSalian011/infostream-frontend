<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-pink-100 min-h-screen p-3 py-5 sm:p-4 sm:py-8">
    
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl p-5 sm:p-8">
        
        <!-- Header -->
        <div class="text-center mb-5 sm:mb-8">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-1 sm:mb-2">Setup Your Settings</h1>
            <p class="text-sm sm:text-base text-gray-600">Tell us your location and API preferences</p>
        </div>

        <!-- Settings Form -->
        <form id="settingsForm" class="space-y-4 sm:space-y-6">
            
            <!-- Location Section -->
            <div class="bg-gray-50 p-4 sm:p-6 rounded-xl">
                <h2 class="text-lg sm:text-xl font-semibold text-gray-800 mb-3 sm:mb-4 flex items-center">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6 mr-2 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    Location *
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">
                    <div>
                        <label for="country" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1 sm:mb-2">Country *</label>
                        <select id="country" class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition">
                            <option value="">-- Select Country --</option>
                        </select>
                        <span class="loader" id="country-loader">Loading countries...</span>
                    </div>

                    <div>
                        <label for="state" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1 sm:mb-2">State *</label>
                        <select id="state" disabled class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition disabled:opacity-50 disabled:cursor-not-allowed">
                            <option value="">-- Select State --</option>
                        </select>
                        <span class="loader" id="state-loader"></span>
                    </div>

                    <div>
                        <label for="city" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1 sm:mb-2">City *</label>
                        <select id="city" disabled class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition disabled:opacity-50 disabled:cursor-not-allowed">
                            <option value="">-- Select City --</option>
                        </select>
                        <span class="loader" id="city-loader"></span>
                    </div>

                    <input type="hidden" id="timezone">
                </div>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                class="w-full bg-indigo-600 text-white py-3 sm:py-4 rounded-lg font-semibold text-base sm:text-lg hover:bg-indigo-700 transition-all shadow-lg hover:shadow-xl"
            >
                Continue to News Preferences →
            </button>

        </form>

        <!-- Navigation -->
        <div class="text-center mt-4 sm:mt-6">
            <a href="index.html" class="text-indigo-600 hover:text-indigo-800 font-medium text-xs sm:text-sm">
                ← Back to Login
            </a>
        </div>

    </div>

    <script src="config.js"></script>
    <script>
        function checkAuth() {
            const token = sessionStorage.getItem('token');
            if (!token) {
                alert('Please login first');
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }

        async function saveSettings(userLocation) {
            try {
                const token = sessionStorage.getItem('token')
                const response = await fetch(`${API_BASE_URL}/user/location`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(userLocation)
                });

                const result = await response.json();

                if (response.ok) {
                    alert(result.success_message || 'Settings saved successfully!');
                    window.location.href = 'topic-and-schedule.html';
                } else {
                    alert(result.detail || 'Failed to save settings. Please try again.');
                }
            } catch (error) {
                alert('Could not connect to server. Please try again later.');
            }
        }

        const countryEl = document.getElementById('country')
        const stateEl = document.getElementById('state')
        const cityEl = document.getElementById('city')

        const timezoneInput = document.getElementById('timezone')

        // Stores countryCode (e.g "IN") after country is picked
        // so we can pass it when fetching states
        let selectedCountryCode = ''

        // Load countries on page load
        async function loadCountries() {
            setLoader('country-loader', 'Loading Countries...')
            try {
                const url = `${GEO_BASE_URL}/countryInfoJSON?username=${GEO_USER}`
                const res = await fetch(url)
                const json = await res.json()

                if (json.status) throw new Error(json.status.message)

                json.geonames
                    .sort((a,b) => a.countryName.localeCompare(b.countryName))
                    .forEach(({ countryName, countryCode }) => {
                        const opt = document.createElement('option')
                        opt.value = countryCode
                        opt.textContent = countryName
                        countryEl.appendChild(opt)
                    }) 
            } catch (err) {
                setLoader('country-loader', '⚠️ Failed to load countries.')
                console.error(err)
            } finally{
                setLoader('country-loader', '')
            }
        }

        // Load States for a Country
        // GeoNames: featureCode=ADM1 means "first-level administrative division"
        // maxRows=50 is enough for any country (India has 28 states + 8 UTs)
        async function loadStates(countryCode){
            resetSelect(stateEl, '-- Select State --')
            resetSelect(cityEl, '-- Select CIty --')
            stateEl.disabled = true
            cityEl.disabled = true
            setLoader('state-loader', 'Loading States...')

            try{
                const params = new URLSearchParams({
                    country: countryCode,
                    featureCode: 'ADM1',
                    maxRows: 50,
                    username: GEO_USER
                })

                const res = await fetch(`${GEO_BASE_URL}/searchJSON?${params}`)
                const json = await res.json()

                if (json.status) throw new Error(json.status.message)

                if(!json.geonames?.length){
                    setLoader('state-loader', 'No states found - select a city directly')
                    await loadCitiesByCountry(countryCode)
                    return
                }

                json.geonames
                    .sort((a,b) => a.name.localeCompare(b.name))
                    .forEach(({ name, adminCode1 }) => {
                        const opt = document.createElement('option')
                        opt.value = adminCode1  // MH for Maharashtra
                        opt.textContent = name
                        stateEl.appendChild(opt)
                    })

                stateEl.disabled = false
            } catch(err){
                setLoader('state-loader', '⚠️ Failed to load states')
                console.error(err)
            } finally {
                setLoader('state-loader', '')
            }
        }

        // A. Load Cities filtered by State
        // adminCode1 = state code (e.g "MH")
        // featureClass=P means "Populated place" (covers all city types)
        // orderby=population ensures biggest cities come first
        // Load cities when country changes
        async function loadCitiesByState(countryCode, adminCode1){
            resetSelect(cityEl, '-- Select City --')
            cityEl.disabled = true
            setLoader('city-loader', 'Loading Cities...')

            try{
                const params = new URLSearchParams({
                    country: countryCode,
                    adminCode1: adminCode1,
                    featureClass: 'P',      // Populated places only
                    orderby: 'population',   // Biggest cities first
                    maxRows: 100,
                    username: GEO_USER
                })

                // Add population filter separately (URLSearchParams encodes it fine)  
                params.append('cities', 'cities15000')  // Built-in GeoNames filter: cities > 15k

                const res = await fetch(`${GEO_BASE_URL}/searchJSON?${params}`)
                const json = await res.json()

                if(json.status) throw new Error(json.status.message)

                // Additionally filter client-side by population for cleaner results
                const cities = (json.geonames || [])
                    .filter(c => (c.population || 0) >= MIN_CITY_POPULATION)
                    .sort((a,b) => a.name.localeCompare(b.name))

                if (!cities.length){
                    setLoader('city-loader', 'No major cities found for this state')
                    return
                }

                cities.forEach(({ name, population }) => {
                    const opt = document.createElement('option')
                    opt.value = name
                    opt.textContent = name
                    cityEl.appendChild(opt)
                })

                cityEl.disabled = false

            } catch(err){
                setLoader('city-loader', '⚠️ Failed to load cities.')
                console.error(err)
            } finally {
                setLoader('city-loader', '')
            }
        }

        // B. Fallback: Cities directly by Country
        async function loadCitiesByCountry(countryCode){
            setLoader('city-loader', 'Loading Cities...')

            try{
                const params = new URLSearchParams({
                    country: countryCode,
                    featureClass: 'P',
                    orderby: 'population',
                    maxRows: 100,
                    username: GEO_USER
                })
                params.append('cities', 'cities15000')

                const res = await fetch(`${GEO_BASE_URL}/searchJSON?${params}`)
                const json = await res.json()

                if(json.status) throw new Error(json.status.message)

                const cities = (json.geonames || [])
                    .filter(c => (c.population || 0) >= MIN_CITY_POPULATION)
                    .sort((a,b) => a.name.localeCompare(b.name))

                if(!cities.length){
                    setLoader('city-loader', 'No major cities for this country')
                    return
                }

                cities.forEach(({ name, population }) => {
                    const opt = document.createElement('option')
                    opt.value = name
                    opt.textContent = name
                    cityEl.appendChild(opt)
                })

                cityEl.disabled = false
            } catch(err){
                setLoader('city-loader', '⚠️ Failed to load cities')
                console.error(err)
            } finally {
                setLoader('city-loader', '')
            }
        }

        // Helpers
        function resetSelect(el, placeholder){
            el.innerHTML = `<option value="">${placeholder}</option>`
        }

        function setLoader(id, msg){
            document.getElementById(id).textContent = msg
        }

        countryEl.addEventListener('change', () => {
            selectedCountryCode = countryEl.value
            if (selectedCountryCode){
                timezoneInput.value = TIMEZONE_MAP[selectedCountryCode] || 'UTC'
                loadStates(selectedCountryCode)
            }
        })

        stateEl.addEventListener('change', () => {
            const adminCode = stateEl.value
            if (selectedCountryCode && adminCode){
                loadCitiesByState(selectedCountryCode, adminCode)
            }
        })

        // Form submission
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!countryEl.value) {
                alert('Please select a country')
                return
            }

            if (!cityEl.value) {
                alert('Please select a city')
                return
            }

            const userLocation = {
                country_code: countryEl.value,   // "IN"
                country_name: countryEl.options[countryEl.selectedIndex]?.text || '',   // "India"
                state_code: stateEl.value || '',   // MH
                state_name: stateEl.options[stateEl.selectedIndex]?.text || '',   // Maharashtra 
                city: cityEl.value,     // "Mumbai"
                timezone: timezoneInput.value || 'UTC'   // "Asia/Kolkata"
            };

            if (checkAuth()) {
                await saveSettings(userLocation);
            }
        });

        // Init
        loadCountries()
    </script>

</body>
</html>
