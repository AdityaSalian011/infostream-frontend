<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-orange-50 to-yellow-100 min-h-screen p-3 py-5 sm:p-4 sm:py-8">
    
    <div class="max-w-5xl mx-auto">
        
        <!-- Header -->
        <div class="bg-white rounded-2xl shadow-2xl p-5 sm:p-8 mb-4 sm:mb-6">
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 sm:gap-0">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-1 sm:mb-2">Your News Dashboard</h1>
                    <p class="text-sm sm:text-base text-gray-600">Manage your personalized news preferences</p>
                </div>
                <div class="flex gap-2 sm:gap-3">
                    <button 
                        id="settingsBtn"
                        class="bg-gray-600 text-white px-3 sm:px-4 py-1.5 sm:py-2 text-sm sm:text-base rounded-lg font-semibold hover:bg-gray-700 transition-all flex items-center gap-1 sm:gap-2"
                    >
                        ⚙️ Settings
                    </button>
                    <button 
                        id="logoutBtn"
                        class="bg-red-600 text-white px-3 sm:px-4 py-1.5 sm:py-2 text-sm sm:text-base rounded-lg font-semibold hover:bg-red-700 transition-all"
                    >
                        Logout
                    </button>
                </div>
            </div>
            <div class="flex mt-2 sm:mt-3 gap-2 text-sm sm:text-base">
                <p class="text-gray font-semibold">Check your inbox at</p>
                <a href="https://mail.google.com/mail" target="_blank" class="text-blue-900 font-bold underline">Gmail.com</a>
            </div>
        </div>

        <!-- Preferences List -->
        <div class="bg-white rounded-2xl shadow-2xl p-4 sm:p-6 mb-4 sm:mb-6">
            <div class="flex items-center justify-between mb-3 sm:mb-4">
                <h2 class="text-lg sm:text-xl font-semibold text-gray-800">Your News Preferences</h2>
                <button 
                    id="addNewBtn"
                    class="bg-green-600 text-white px-3 sm:px-4 py-1.5 sm:py-2 text-sm sm:text-base rounded-lg font-semibold hover:bg-green-700 transition-all flex items-center gap-1 sm:gap-2"
                >
                    ➕ Add New
                </button>
            </div>

            <div id="preferencesList" class="space-y-4">
                <p class="text-gray-500 text-center py-8">Loading your preferences...</p>
            </div>
        </div>

    </div>

    <!-- Add/Edit Modal -->
    <div id="preferenceModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-3 sm:p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-5 sm:p-8">
            <div class="flex justify-between items-center mb-4 sm:mb-6">
                <h2 id="modalTitle" class="text-xl sm:text-2xl font-bold text-gray-800">Add New Preference</h2>
                <button id="closeModal" class="text-gray-500 hover:text-gray-700 text-2xl leading-none">×</button>
            </div>

            <form id="preferenceForm" class="space-y-4 sm:space-y-6">
                <input type="hidden" id="editingPreferenceId">

                <!-- News Topic -->
                <div>
                    <h3 class="text-base sm:text-lg font-semibold text-gray-800 mb-2 sm:mb-3">News Topic</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 sm:gap-3 mb-3 sm:mb-4">
                        <button type="button" class="topic-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-topic="general">General</button>
                        <button type="button" class="topic-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-topic="business">Business</button>
                        <button type="button" class="topic-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-topic="entertainment">Entertainment</button>
                        <button type="button" class="topic-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-topic="health">Health</button>
                        <button type="button" class="topic-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-topic="science">Science</button>
                        <button type="button" class="topic-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-topic="sports">Sports</button>
                        <button type="button" class="topic-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-topic="technology">Technology</button>
                        <button type="button" class="topic-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-topic="other">Other</button>
                    </div>
                    <input type="hidden" id="selectedTopic" required>
                    <div id="customTopicContainer" class="hidden mt-2 sm:mt-3">
                        <input type="text" id="customTopic" class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none" placeholder="Enter custom topic">
                    </div>
                </div>

                <!-- Delivery Time -->
                <div>
                    <h3 class="text-base sm:text-lg font-semibold text-gray-800 mb-2 sm:mb-3">Delivery Time</h3>
                    <div class="space-y-2 sm:space-y-3">
                        <button type="button" class="time-btn w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all text-left" data-time="now">⚡ Send Now</button>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-2 sm:gap-3">
                            <button type="button" class="time-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-time="11:00">11:00 AM</button>
                            <button type="button" class="time-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-time="14:00">02:00 PM</button>
                            <button type="button" class="time-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-time="17:00">05:00 PM</button>
                            <button type="button" class="time-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-time="19:00">07:00 PM</button>
                            <button type="button" class="time-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-time="21:00">09:00 PM</button>
                            <button type="button" class="time-btn px-2 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-orange-500 hover:bg-orange-50 transition-all" data-time="23:00">11:00 PM</button>
                        </div>
                    </div>
                    <input type="hidden" id="selectedTime" required>
                </div>

                <button type="submit" class="w-full bg-orange-600 text-white py-2.5 sm:py-3 text-sm sm:text-base rounded-lg font-semibold hover:bg-orange-700 transition-all">
                    Save Preference
                </button>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-3 sm:p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-5 sm:p-8">
            <div class="flex justify-between items-center mb-4 sm:mb-6">
                <h2 class="text-xl sm:text-2xl font-bold text-gray-800">Account Settings</h2>
                <button id="closeSettingsModal" class="text-gray-500 hover:text-gray-700 text-2xl leading-none">×</button>
            </div>

            <form id="settingsForm" class="space-y-3 sm:space-y-4">
                <div>
                    <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-1 sm:mb-2">Country</label>
                    <input type="text" id="settingsCountry" class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-1 sm:mb-2">City</label>
                    <input type="text" id="settingsCity" class="w-full px-3 sm:px-4 py-2 sm:py-3 text-sm sm:text-base border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-1 sm:mb-2">News API Key</label>
                    <input type="text" id="settingsNewsApiKey" class="w-full px-3 sm:px-4 py-2 sm:py-3 text-xs sm:text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none font-mono">
                </div>
                <div>
                    <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-1 sm:mb-2">Weather API Key</label>
                    <input type="text" id="settingsWeatherApiKey" class="w-full px-3 sm:px-4 py-2 sm:py-3 text-xs sm:text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none font-mono">
                </div>
                <button type="submit" class="w-full bg-orange-600 text-white py-2.5 sm:py-3 text-sm sm:text-base rounded-lg font-semibold hover:bg-orange-700 transition-all">
                    Update Settings
                </button>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // Check if user is logged in
        function checkAuth() {
            const token = sessionStorage.getItem('token');
            if (!token) {
                alert('Please login first');
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }

        // Load all preferences
        async function loadPreferences() {
            const token = sessionStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/news/preferences`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const result = await response.json();

                if (response.ok) {
                    displayPreferences(result.preferences || []);
                } else {
                    if (response.status === 401) {
                        alert('Session expired. Please login again.');
                        sessionStorage.removeItem('token');
                        window.location.href = 'index.html';
                    } else {
                        alert(result.detail || 'Failed to load preferences');
                    }
                }
            } catch (error) {
                
                alert('Could not connect to server');
            }
        }

        // Display preferences
        function displayPreferences(preferences) {
            const container = document.getElementById('preferencesList');
            
            if (preferences.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-gray-500"><p class="text-lg">No preferences found</p><p class="text-sm mt-2">Click "Add New" to create your first preference</p></div>';
                return;
            }

            container.innerHTML = preferences.map(pref => `
                <div class="border border-gray-200 rounded-lg p-4 sm:p-6 hover:shadow-lg transition-shadow">
                    <div class="flex items-start justify-between gap-3">
                        <div class="flex-1 min-w-0">
                            <h3 class="text-base sm:text-xl font-semibold text-gray-800 mb-1 sm:mb-2">📰 ${pref.newsTopic}</h3>
                            <p class="text-sm sm:text-base text-gray-600 mb-2">🕐 Delivery: ${pref.deliveryTime}</p>
                            <div class="flex flex-wrap gap-1 sm:gap-2 text-xs sm:text-sm">
                                ${pref.isImmediate ? '<span class="bg-green-100 text-green-800 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full">Immediate</span>' : ''}
                                ${pref.isScheduled ? '<span class="bg-blue-100 text-blue-800 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full">Scheduled</span>' : ''}
                                ${pref.isCustomTopic ? '<span class="bg-purple-100 text-purple-800 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full">Custom</span>' : ''}
                            </div>
                        </div>
                        <div class="flex gap-1 sm:gap-2 flex-shrink-0">
                            <button onclick="editPreference(${pref.id}, '${pref.newsTopic.replace(/'/g, "\\'")}', '${pref.deliveryTime}', ${pref.isCustomTopic})" class="bg-blue-500 text-white px-2 sm:px-4 py-1.5 sm:py-2 text-sm rounded-lg hover:bg-blue-600 transition">✏️</button>
                            <button onclick="deletePreference(${pref.id}, '${pref.newsTopic.replace(/'/g, "\\'")}' )" class="bg-red-500 text-white px-2 sm:px-4 py-1.5 sm:py-2 text-sm rounded-lg hover:bg-red-600 transition">🗑️</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Create preference
        async function createPreference(data) {
            const token = sessionStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/news/preferences`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    alert('✅ Preference saved successfully!');
                    closeModal();
                    loadPreferences();
                } else {
                    alert('❌ ' + (result.detail || 'Failed to save preference'));
                }
            } catch (error) {
                
                alert('Could not connect to server');
            }
        }

        // Update preference
        async function updatePreference(id, data) {
            const token = sessionStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/news/preferences/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    alert('✅ Preference updated successfully!');
                    closeModal();
                    loadPreferences();
                } else {
                    if (response.status === 403) {
                        alert('❌ You do not have permission to edit this preference');
                    } else {
                        alert('❌ ' + (result.detail || 'Failed to update preference'));
                    }
                }
            } catch (error) {
                
                alert('Could not connect to server');
            }
        }

        // Delete preference
        async function deletePreference(id, name) {
            if (!confirm(`Are you sure you want to delete "${name}"?`)) return;

            const token = sessionStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/news/preferences/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const result = await response.json();

                if (response.ok) {
                    alert('✅ ' + result.message);
                    loadPreferences();
                } else {
                    if (response.status === 403) {
                        alert('❌ You do not have permission to delete this preference');
                    } else {
                        alert('❌ ' + (result.detail || 'Failed to delete preference'));
                    }
                }
            } catch (error) {
                
                alert('Could not connect to server');
            }
        }

        // Update settings
        async function updateSettings(data) {
            const token = sessionStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_BASE_URL}/user/setting`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    alert('✅ Settings updated successfully!');
                    closeSettingsModal();
                } else {
                    alert('❌ ' + (result.detail || 'Failed to update settings'));
                }
            } catch (error) {
                
                alert('Could not connect to server');
            }
        }

        // UI Functions
        function openModal() {
            document.getElementById('modalTitle').textContent = 'Add New Preference';
            document.getElementById('editingPreferenceId').value = '';
            document.getElementById('selectedTopic').value = '';
            document.getElementById('selectedTime').value = '';
            document.getElementById('customTopic').value = '';
            document.querySelectorAll('.topic-btn, .time-btn').forEach(btn => {
                btn.classList.remove('bg-orange-500', 'text-white', 'border-orange-500');
                btn.classList.add('border-gray-300', 'text-gray-700');
            });
            document.getElementById('preferenceModal').classList.remove('hidden');
        }

        function editPreference(id, topic, time, isCustom) {
            document.getElementById('modalTitle').textContent = 'Edit Preference';
            document.getElementById('editingPreferenceId').value = id;
            
            if (isCustom) {
                document.getElementById('selectedTopic').value = 'other';
                document.getElementById('customTopic').value = topic;
                document.getElementById('customTopicContainer').classList.remove('hidden');
                document.querySelector('[data-topic="other"]').classList.add('bg-orange-500', 'text-white', 'border-orange-500');
            } else {
                document.getElementById('selectedTopic').value = topic;
                const btn = document.querySelector(`[data-topic="${topic}"]`);
                if (btn) btn.classList.add('bg-orange-500', 'text-white', 'border-orange-500');
            }
            
            document.getElementById('selectedTime').value = time;
            const timeBtn = document.querySelector(`[data-time="${time}"]`);
            if (timeBtn) timeBtn.classList.add('bg-orange-500', 'text-white', 'border-orange-500');
            
            document.getElementById('preferenceModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('preferenceModal').classList.add('hidden');
        }

        function openSettingsModal() {
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.removeItem('token');
                window.location.href = 'index.html';
            }
        }

        // Event Listeners
        document.querySelectorAll('.topic-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.topic-btn').forEach(b => {
                    b.classList.remove('bg-orange-500', 'text-white', 'border-orange-500');
                    b.classList.add('border-gray-300', 'text-gray-700');
                });
                this.classList.add('bg-orange-500', 'text-white', 'border-orange-500');
                document.getElementById('selectedTopic').value = this.dataset.topic;
                
                if (this.dataset.topic === 'other') {
                    document.getElementById('customTopicContainer').classList.remove('hidden');
                } else {
                    document.getElementById('customTopicContainer').classList.add('hidden');
                }
            });
        });

        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.time-btn').forEach(b => {
                    b.classList.remove('bg-orange-500', 'text-white', 'border-orange-500');
                    b.classList.add('border-gray-300', 'text-gray-700');
                });
                this.classList.add('bg-orange-500', 'text-white', 'border-orange-500');
                document.getElementById('selectedTime').value = this.dataset.time;
            });
        });

        document.getElementById('preferenceForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const topic = document.getElementById('selectedTopic').value;
            const time = document.getElementById('selectedTime').value;
            const customTopic = document.getElementById('customTopic').value;
            const editingId = document.getElementById('editingPreferenceId').value;

            if (!topic || !time) {
                alert('Please select both topic and delivery time');
                return;
            }

            const data = {
                newsTopic: topic === 'other' ? customTopic : topic,
                isCustomTopic: topic === 'other',
                deliveryTime: time,
                isImmediate: time === 'now',
                isScheduled: time !== 'now'
            };

            if (editingId) {
                await updatePreference(editingId, data);
            } else {
                await createPreference(data);
            }
        });

        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {};
            const country = document.getElementById('settingsCountry').value.trim();
            const city = document.getElementById('settingsCity').value.trim();
            const newsApi = document.getElementById('settingsNewsApiKey').value.trim();
            const weatherApi = document.getElementById('settingsWeatherApiKey').value.trim();

            if (country) data.country = country;
            if (city) data.city = city;
            if (newsApi) data.newsApi = newsApi;
            if (weatherApi) data.weatherApi = weatherApi;

            if (Object.keys(data).length === 0) {
                alert('Please fill in at least one field');
                return;
            }

            await updateSettings(data);
        });

        document.getElementById('addNewBtn').addEventListener('click', openModal);
        document.getElementById('settingsBtn').addEventListener('click', openSettingsModal);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('closeSettingsModal').addEventListener('click', closeSettingsModal);

        // Initialize
        if (checkAuth()) {
            loadPreferences();
        }
    </script>
</body>
</html>
