<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-3 sm:p-4">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-5 sm:p-8">

        <div class="text-center mb-5 sm:mb-8">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-1 sm:mb-2">Reset Password</h1>
            <p class="text-sm sm:text-base text-gray-600">Enter and confirm your new password</p>
        </div>

        <div id="alert-box" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

        <div class="space-y-3 sm:space-y-4">
            <div>
                <label for="new-password" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">New Password</label>
                <input
                    type="password"
                    id="new-password"
                    placeholder="••••••••"
                    class="w-full px-3 sm:px-4 py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                />
            </div>

            <div>
                <label for="confirm-password" class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input
                    type="password"
                    id="confirm-password"
                    placeholder="••••••••"
                    class="w-full px-3 sm:px-4 py-2 text-sm sm:text-base border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                />
            </div>

            <button
                id="submit-btn"
                onclick="handleReset()"
                class="w-full bg-indigo-600 text-white py-2.5 sm:py-3 text-sm sm:text-base rounded-lg font-semibold hover:bg-indigo-700 transition-all shadow-md hover:shadow-lg"
            >
                Confirm
            </button>
        </div>

    </div>

    <script src="config.js"></script>
    <script>
        const token = new URLSearchParams(window.location.search).get('token');

        if (!token) {
            alert('Invalid or expired reset link. Please request a new one.');
            window.location.href = 'forgot_password.html';
        }

        function showAlert(message, type) {
            const box = document.getElementById('alert-box');
            box.textContent = message;
            box.className = type === 'success'
                ? 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-green-50 text-green-700 border border-green-200'
                : 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200';
        }

        async function handleReset() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const btn = document.getElementById('submit-btn');

            if (!newPassword || !confirmPassword) {
                showAlert('Please fill in both fields.', 'error');
                return;
            }

            if (newPassword.length < 8) {
                showAlert('Password must be at least 8 characters.', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const response = await fetch(`${API_BASE_URL}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 'token': token, 'new_password': newPassword })
                });

                const result = await response.json();

                if (response.ok) {
                    alert('Password updated successfully!');
                    window.location.href = 'index.html';
                } else {
                    if (response.status === 400) {
                        alert('Invalid or expired reset link. Please request a new one.');
                        window.location.href = 'forgot_password.html';
                    } else {
                        const msg = result.detail[0].msg || result.detail || 'Something went wrong.'
                        showAlert(msg, 'error');
                    }
                }

            } catch (err) {
                showAlert('Could not connect to server. Please try again later.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Confirm';
            }
        }

        document.getElementById('confirm-password').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleReset();
        });
    </script>

</body>
</html>
