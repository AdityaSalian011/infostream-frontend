<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Preferences</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-teal-100 min-h-screen p-4 py-8">
    
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl p-8">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">News Preferences</h1>
            <p class="text-gray-600">Choose your news topic and delivery schedule</p>
        </div>

        <!-- Preferences Form -->
        <form id="preferencesForm" class="space-y-6">
            
            <!-- News Topic Section -->
            <div class="bg-gray-50 p-6 rounded-xl">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>
                    </svg>
                    News Topic *
                </h2>
                
                <p class="text-sm text-gray-600 mb-4">Select your preferred news category</p>
                
                <!-- News Topic Buttons Grid -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                    <button type="button" class="news-topic-btn px-4 py-3 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-indigo-500 hover:bg-indigo-50 hover:text-indigo-700 transition-all" data-topic="general">General</button>
                    <button type="button" class="news-topic-btn px-4 py-3 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-indigo-500 hover:bg-indigo-50 hover:text-indigo-700 transition-all" data-topic="business">Business</button>
                    <button type="button" class="news-topic-btn px-4 py-3 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-indigo-500 hover:bg-indigo-50 hover:text-indigo-700 transition-all" data-topic="entertainment">Entertainment</button>
                    <button type="button" class="news-topic-btn px-4 py-3 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-indigo-500 hover:bg-indigo-50 hover:text-indigo-700 transition-all" data-topic="health">Health</button>
                    <button type="button" class="news-topic-btn px-4 py-3 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-indigo-500 hover:bg-indigo-50 hover:text-indigo-700 transition-all" data-topic="science">Science</button>
                    <button type="button" class="news-topic-btn px-4 py-3 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-indigo-500 hover:bg-indigo-50 hover:text-indigo-700 transition-all" data-topic="sports">Sports</button>
                    <button type="button" class="news-topic-btn px-4 py-3 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-indigo-500 hover:bg-indigo-50 hover:text-indigo-700 transition-all" data-topic="technology">Technology</button>
                    <button type="button" class="news-topic-btn px-4 py-3 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-indigo-500 hover:bg-indigo-50 hover:text-indigo-700 transition-all" data-topic="other">Other</button>
                </div>

                <!-- Hidden input to store selected topic -->
                <input type="hidden" id="selectedTopic" required>

                <!-- Custom Topic Input (Hidden by default) -->
                <div id="customTopicContainer" class="hidden mt-4">
                    <label for="customTopic" class="block text-sm font-medium text-gray-700 mb-2">
                        Enter your custom news topic
                    </label>
                    <input 
                        type="text" 
                        id="customTopic" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                        placeholder="e.g., Climate Change, Space Exploration"
                    >
                </div>

                <!-- Display selected topic -->
                <div id="selectedTopicDisplay" class="mt-3 text-sm"></div>
            </div>

            <!-- Delivery Time Section -->
            <div class="bg-gray-50 p-6 rounded-xl">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Delivery Schedule *
                </h2>
                
                <p class="text-sm text-gray-600 mb-4">When would you like to receive your news?</p>

                <!-- Instant Delivery Option -->
                <div class="mb-4">
                    <button 
                        type="button" 
                        id="nowBtn"
                        class="delivery-option w-full px-6 py-4 border-2 border-indigo-300 rounded-lg font-semibold text-indigo-700 bg-white hover:border-indigo-600 hover:bg-indigo-50 transition-all flex items-center justify-center gap-2"
                        data-delivery="now"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                        Send Now (Immediate)
                    </button>
                </div>

                <!-- Scheduled Time Options -->
                <p class="text-sm text-gray-600 mb-3">Or schedule daily delivery:</p>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <button type="button" class="delivery-option time-slot-btn px-4 py-4 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-teal-500 hover:bg-teal-50 hover:text-teal-700 transition-all" data-delivery="11:00 AM">
                        <div class="text-lg font-bold">11:00 AM</div>
                        <div class="text-xs text-gray-500">Morning</div>
                    </button>
                    <button type="button" class="delivery-option time-slot-btn px-4 py-4 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-teal-500 hover:bg-teal-50 hover:text-teal-700 transition-all" data-delivery="02:00 PM">
                        <div class="text-lg font-bold">02:00 PM</div>
                        <div class="text-xs text-gray-500">Afternoon</div>
                    </button>
                    <button type="button" class="delivery-option time-slot-btn px-4 py-4 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-teal-500 hover:bg-teal-50 hover:text-teal-700 transition-all" data-delivery="05:00 PM">
                        <div class="text-lg font-bold">05:00 PM</div>
                        <div class="text-xs text-gray-500">Evening</div>
                    </button>
                    <button type="button" class="delivery-option time-slot-btn px-4 py-4 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-teal-500 hover:bg-teal-50 hover:text-teal-700 transition-all" data-delivery="07:00 PM">
                        <div class="text-lg font-bold">07:00 PM</div>
                        <div class="text-xs text-gray-500">Evening</div>
                    </button>
                    <button type="button" class="delivery-option time-slot-btn px-4 py-4 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-teal-500 hover:bg-teal-50 hover:text-teal-700 transition-all" data-delivery="09:00 PM">
                        <div class="text-lg font-bold">09:00 PM</div>
                        <div class="text-xs text-gray-500">Night</div>
                    </button>
                    <button type="button" class="delivery-option time-slot-btn px-4 py-4 border-2 border-gray-300 rounded-lg font-medium text-gray-700 hover:border-teal-500 hover:bg-teal-50 hover:text-teal-700 transition-all" data-delivery="11:00 PM">
                        <div class="text-lg font-bold">11:00 PM</div>
                        <div class="text-xs text-gray-500">Late Night</div>
                    </button>
                </div>

                <!-- Hidden input to store selected time -->
                <input type="hidden" id="selectedDeliveryTime" required>

                <!-- Display selected time -->
                <div id="selectedTimeDisplay" class="mt-4 text-sm text-gray-600"></div>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                class="w-full bg-teal-600 text-white py-4 rounded-lg font-semibold text-lg hover:bg-teal-700 transition-all shadow-lg hover:shadow-xl"
            >
                Complete Setup →
            </button>

        </form>

        <!-- Navigation -->
        <div class="text-center mt-6">
            <a href="user-settings.html" class="text-teal-600 hover:text-teal-800 font-medium text-sm">
                ← Back to Settings
            </a>
        </div>

    </div>
    <script src="config.js"></script>
    <script>
        // Save preferences to backend
        async function savePreferences(preferenceData, currentUser) {
            try {
                const response = await fetch(
                    `${API_BASE_URL}/news-preferences/${currentUser.id}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(preferenceData)
                    }
                );

                const result = await response.json();

                if (response.ok) {
                    console.log('✓ Preferences saved:', result);

                    alert('Setup complete! Redirecting to your dashboard...');
                    window.location.href = 'news-summary.html';
                } else {
                    console.error('✗ Failed to save preferences:', result.detail);
                    alert(result.detail || 'Failed to save preferences. Please try again.');
                }
            } catch (error) {
                console.error('✗ Error saving preferences:', error);
                alert('Could not connect to server. Make sure the backend is running.\nRun: python main.py');
            }
        }

        // Topic buttons
        const newsTopicButtons = document.querySelectorAll('.news-topic-btn');
        const selectedTopicInput = document.getElementById('selectedTopic');
        const customTopicContainer = document.getElementById('customTopicContainer');
        const customTopicInput = document.getElementById('customTopic');
        const selectedTopicDisplay = document.getElementById('selectedTopicDisplay');

        let currentSelectedTopic = null;

        // Handle topic selection
        newsTopicButtons.forEach(button => {
            button.addEventListener('click', function() {
                const topic = this.getAttribute('data-topic');
                
                // Remove selected styling from all buttons
                newsTopicButtons.forEach(btn => {
                    btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
                    btn.classList.add('border-gray-300', 'text-gray-700');
                });
                
                // Add selected styling
                this.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
                this.classList.remove('border-gray-300', 'text-gray-700');
                
                currentSelectedTopic = topic;
                selectedTopicInput.value = topic;
                
                // Show custom input if 'other' selected
                if (topic === 'other') {
                    customTopicContainer.classList.remove('hidden');
                    customTopicInput.setAttribute('required', 'required');
                    selectedTopicDisplay.innerHTML = '<span class="text-indigo-600 font-medium">Please enter your custom topic below</span>';
                } else {
                    customTopicContainer.classList.add('hidden');
                    customTopicInput.removeAttribute('required');
                    customTopicInput.value = '';
                    selectedTopicDisplay.innerHTML = `<span class="text-green-600 font-medium">✓ Selected: ${topic.charAt(0).toUpperCase() + topic.slice(1)}</span>`;
                }
            });
        });

        // Delivery time buttons
        const deliveryOptions = document.querySelectorAll('.delivery-option');
        const selectedDeliveryTimeInput = document.getElementById('selectedDeliveryTime');
        const selectedTimeDisplay = document.getElementById('selectedTimeDisplay');
        const nowBtn = document.getElementById('nowBtn');

        let currentSelectedTime = null;

        // Handle delivery time selection
        deliveryOptions.forEach(button => {
            button.addEventListener('click', function() {
                const deliveryTime = this.getAttribute('data-delivery');
                
                // Remove selected styling from all buttons
                deliveryOptions.forEach(btn => {
                    btn.classList.remove('bg-teal-600', 'bg-indigo-600', 'text-white', 'border-teal-600', 'border-indigo-600');
                    
                    if (btn.id === 'nowBtn') {
                        btn.classList.add('border-indigo-300', 'text-indigo-700', 'bg-white');
                    } else {
                        btn.classList.add('border-gray-300', 'text-gray-700');
                    }
                });
                
                // Add selected styling
                if (this.id === 'nowBtn') {
                    this.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
                    this.classList.remove('border-indigo-300', 'text-indigo-700', 'bg-white');
                    selectedTimeDisplay.innerHTML = '<span class="text-indigo-600 font-medium">✓ News will be sent immediately</span>';
                } else {
                    this.classList.add('bg-teal-600', 'text-white', 'border-teal-600');
                    this.classList.remove('border-gray-300', 'text-gray-700');
                    selectedTimeDisplay.innerHTML = `<span class="text-teal-600 font-medium">✓ Daily delivery at ${deliveryTime}</span>`;
                }
                
                currentSelectedTime = deliveryTime;
                selectedDeliveryTimeInput.value = deliveryTime;
            });
        });

        // Handle form submission
        document.getElementById('preferencesForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validate topic selection
            const newsTopic = document.getElementById('selectedTopic').value;
            if (!newsTopic) {
                alert('Please select a news topic!');
                return;
            }

            // Validate custom topic if 'other' selected
            const customTopic = document.getElementById('customTopic').value;
            if (newsTopic === 'other' && !customTopic.trim()) {
                alert('Please enter your custom news topic!');
                customTopicInput.focus();
                return;
            }

            // Validate delivery time selection
            if (!currentSelectedTime) {
                alert('Please select a delivery time!');
                return;
            }

            // Get user from localStorage
            let currentUser;
            try {
                currentUser = JSON.parse(localStorage.getItem('currentUser'));
            } catch (error) {
                console.error('Error accessing localStorage:', error);
                alert('Error accessing user session. Please login again!');
                window.location.href = 'login.html';
                return;
            }

            if (!currentUser || !currentUser.id) {
                alert('Session expired. Please login again!');
                window.location.href = 'login.html';
                return;
            }

            // Determine final topic
            const finalTopic = newsTopic === 'other' ? customTopic : newsTopic;
            const isImmediate = currentSelectedTime === 'now';

            // Build preference data
            const preferenceData = {
                newsTopic: finalTopic,
                isCustomTopic: newsTopic === 'other',
                deliveryTime: currentSelectedTime,
                isImmediate: isImmediate,
                isScheduled: !isImmediate
            };

            console.log('Submitting preferences:', preferenceData);

            await savePreferences(preferenceData, currentUser);
        });
    </script>

</body>
</html>
