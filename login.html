<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up / Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    
    <!-- Main Container -->
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Welcome</h1>
            <p class="text-gray-600">Create an account or sign in to continue</p>
        </div>

        <!-- Tab Buttons for switching between Sign Up and Login -->
        <div class="flex mb-6 bg-gray-100 rounded-lg p-1">
            <button id="signupTab" class="flex-1 py-2 px-4 rounded-md font-semibold transition-all bg-white text-indigo-600 shadow-sm">
                Sign Up
            </button>
            <button id="loginTab" class="flex-1 py-2 px-4 rounded-md font-semibold transition-all text-gray-600 hover:text-gray-800">
                Login
            </button>
        </div>

        <!-- Sign Up Form -->
        <form id="signupForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <!-- First Name Input -->
                <div>
                    <label for="firstName" class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                    <input 
                        type="text" 
                        id="firstName" 
                        name="firstName"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                        placeholder="John"
                    >
                </div>
                
                <!-- Last Name Input -->
                <div>
                    <label for="lastName" class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                    <input 
                        type="text" 
                        id="lastName" 
                        name="lastName"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                        placeholder="Doe"
                    >
                </div>
            </div>

            <!-- Email Input for Sign Up -->
            <div>
                <label for="signupEmail" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input 
                    type="email" 
                    id="signupEmail" 
                    name="email"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                    placeholder="john.doe@example.com"
                >
            </div>

            <!-- Password Input for Sign Up -->
            <div>
                <label for="signupPassword" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input 
                    type="password" 
                    id="signupPassword" 
                    name="password"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                    placeholder="••••••••"
                >
            </div>

            <!-- Sign Up Submit Button -->
            <button 
                type="submit" 
                class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-all shadow-md hover:shadow-lg"
            >
                Create Account
            </button>
        </form>

        <!-- Login Form (Hidden by default) -->
        <form id="loginForm" class="space-y-4 hidden">
            <!-- Email Input for Login -->
            <div>
                <label for="loginEmail" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input 
                    type="email" 
                    id="loginEmail" 
                    name="email"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                    placeholder="john.doe@example.com"
                >
            </div>

            <!-- Password Input for Login -->
            <div>
                <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input 
                    type="password" 
                    id="loginPassword" 
                    name="password"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                    placeholder="••••••••"
                >
            </div>

            <!-- Login Submit Button -->
            <button 
                type="submit" 
                class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-all shadow-md hover:shadow-lg"
            >
                Sign In
            </button>
        </form>

    </div>

    <!-- JavaScript for handling form switching and submissions -->
    <script src="config.js"></script>
    <script>
        // ============================================
        // BACKEND COMMUNICATION FUNCTION
        // ============================================

        // This function sends user data to MySQL
        async function signupUser(userData){
            try{
                // Make POST request to FastAPI endpoint
                const response = await fetch(`${API_BASE_URL}/signup`, 
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(userData)
                    }
                )

                // Parse the response
                const result = await response.json()

                if (response.ok){
                    console.log('✓ User registered successfully:', result)

                    // Store user data in localStorage (without password)
                    try{
                        const userToStore = {
                            id: result.id,
                            firstName: result.firstName,
                            lastName: result.lastName,
                            fullName: result.fullName,
                            email: result.email
                        }
    
                        localStorage.setItem('currentUser', JSON.stringify(userToStore))
                    } catch(error){
                        console.error('Error saving to localStorage:', error)
                        // Continue anyway - user is registered in database
                        alert('Account created successfully! (Note: Session storage unavailable)')
                    }

                    // Show success message
                    alert('Account created successfully!');

                    // Redirect to user settings page
                    window.location.href = 'user-settings.html'
                }else{
                    // Handle error (e.g., email already exists)
                    console.error('✗ Signup failed:', result.detail);
                    alert(result.detail || 'Signup failed. Please try again.');
                }
    
            } catch (error){
                // Handle network errors
                console.error('✗ Error during signup:', error);
                alert('Could not connect to server. Make sure the backend is running.\nRun: python main.py');
            }
        }

        // Login function (Authenticates user)
        async function loginUser(userData){
            try{
                const response = await fetch(`${API_BASE_URL}/login`, 
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(userData)
                    }
                )
                // Parse the JSON response
                const result = await response.json();

                // Check if login was successful
                if (response.ok) {
                    console.log('✓ Login successful:', result);
                    
                    // Store user data in localStorage
                    try{
                        localStorage.setItem('currentUser', JSON.stringify(result.user));
                    }catch(error){
                        console.error('Error saving to localStorage:', error)
                        alert('Login successful! (Note: Session storage unavailable, you may need to login again later)')
                    }
                    
                    // Show success message
                    alert('Login successful!');

                    // ============================================
                    // SMART ROUTING: Redirect based on profile completion
                    // ============================================
                    // The backend tells us where to go based on what the user has completed
                    const redirectUrl = result.redirect_url || 'user-settings.html'

                    // Log where we're redirecting for debugging
                    console.log('Redirecting to:', redirectUrl);

                    window.location.href = redirectUrl;
                }else {
                    // Handle error (e.g., wrong password)
                    console.error('✗ Login failed:', result.detail);
                    alert(result.detail || 'Invalid email or password');
                }

            } catch (error) {
                // Handle network errors
                console.error('✗ Error during login:', error);
                alert('Could not connect to server. Make sure the backend is running.\nRun: python main.py');
            }
        }

        // Get references to DOM elements
        const signupTab = document.getElementById('signupTab');
        const loginTab = document.getElementById('loginTab');
        const signupForm = document.getElementById('signupForm');
        const loginForm = document.getElementById('loginForm');

        // Function to switch to Sign Up form
        signupTab.addEventListener('click', () => {
            // Update tab styling
            signupTab.classList.add('bg-white', 'text-indigo-600', 'shadow-sm');
            signupTab.classList.remove('text-gray-600');
            loginTab.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm');
            loginTab.classList.add('text-gray-600');
            
            // Show signup form, hide login form
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });

        // Function to switch to Login form
        loginTab.addEventListener('click', () => {
            // Update tab styling
            loginTab.classList.add('bg-white', 'text-indigo-600', 'shadow-sm');
            loginTab.classList.remove('text-gray-600');
            signupTab.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm');
            signupTab.classList.add('text-gray-600');
            
            // Show login form, hide signup form
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
        });

        // Handle Sign Up Form Submission
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent default form submission
            
            // FETCHING USER DATA FROM SIGN UP FORM
            // Access form data using various methods:
            
            // Method 1: Direct element access by ID
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            // Method 2: Using FormData API (recommended for larger forms)
            // const formData = new FormData(signupForm);
            // const firstName = formData.get('firstName');
            // const lastName = formData.get('lastName');
            // const email = formData.get('email');
            // const password = formData.get('password');
            
            // Create user object with collected data
            const userData = {
                firstName: firstName,
                lastName: lastName,
                fullName: `${firstName} ${lastName}`, // Combined full name
                email: email,
                password: password
            };
            
            // Display collected data in console (for testing purposes)
            console.log('Sign Up Data:', userData);
            
            // TODO: Send this data to your backend/database
            // Example: 
            // fetch('/api/signup', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify(userData)
            // });

            // call signup function to save to MySQL
            await signupUser(userData)
        });

        // Handle Login Form Submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent default form submission
            
            // FETCHING USER DATA FROM LOGIN FORM
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // Create login credentials object
            const loginData = {
                email: email,
                password: password
            };
            
            // Display collected data in console (for testing purposes)
            console.log('Login Data:', loginData);
            
            // TODO: Verify credentials with your backend
            // Example:
            // fetch('/api/login', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify(loginData)
            // });
            
            // Call login function to authenticate with MySQL
            await loginUser(loginData)
        });
    </script>

</body>
</html>
